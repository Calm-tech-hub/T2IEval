# Six-hour partial-dimension T2I-CoReBench run:
# all 90 prompts in four representative dimensions, one image per prompt.
# Qwen-Image generates images, then an isolated local Qwen3.5-9B worker scores them.
model: diffusers

model_args:
  pretrained: /root/autodl-tmp/modelscope_cache/models/Qwen/Qwen-Image
  pipeline: DiffusionPipeline
  dtype: bfloat16
  show_denoising_progress: false
  enable_vae_tiling: true

generation:
  steps: 50
  guidance_scale: 4.0
  seed: 0
  width: 1328
  height: 1328
  num_images_per_prompt: 1
  negative_prompt: " "
  extra_kwargs:
    # Qwen-Image uses true CFG; the regular guidance_scale is only for
    # guidance-distilled checkpoints and otherwise emits one warning per image.
    guidance_scale: null
    true_cfg_scale: 4.0

evaluations:
  t2i_corebench:
    eval_args:
      data_dir: /root/autodl-tmp/exam/Benchmark_code/T2I-CoReBench/data
      dimensions:
        - C-MI
        - C-MR
        - R-LR
        - R-CR
      # Set this to 2 first for a smoke run; null evaluates all 90 prompts
      # from each selected dimension.
      num_prompts: null

      judge_backend: qwen_subprocess
      judge_model: /root/autodl-tmp/modelscope_cache/models/Qwen/Qwen3.5-9B
      judge_python: /root/autodl-tmp/corebench-judge/.venv/bin/python
      judge_batch_size: 64
      judge_max_rounds: 3
      judge_initial_max_tokens: 512
      judge_gpu_memory_utilization: 0.85
      judge_tensor_parallel_size: 1
      judge_request_chunk_size: 4096

output:
  dir: /root/autodl-tmp/exam/results_t2i_corebench_qwen_image_1img
  save_images: true
  resume: true
  write_artifacts: true
