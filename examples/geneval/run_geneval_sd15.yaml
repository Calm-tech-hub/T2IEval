model: diffusers

model_args:
  pretrained: stable-diffusion-v1-5/stable-diffusion-v1-5
  dtype: float16
  disable_safety_checker: true
  enable_attention_slicing: true

generation:
  steps: 50
  guidance_scale: 9.0
  seed: 42
  negative_prompt: null
  width: null
  height: null
  num_images_per_prompt: 4

evaluations:
  geneval:
    eval_args:
      detector_local_files_only: true

output:
  dir: /root/autodl-tmp/exam/results_geneval_sd15_paper
