model: diffusers

model_args:
  pretrained: sd2-community/stable-diffusion-2-1-base
  dtype: float16
  disable_safety_checker: true
  enable_attention_slicing: true

generation:
  steps: 50
  guidance_scale: 9.0
  seed: 42
  width: 512
  height: 512
  num_images_per_prompt: 1

evaluations:
  genaibench:
    eval_args:
      dataset_name: Vertsineu/geneaibench
      dataset_config_name: image_1600
      split: test_v1
      scorer_model: clip-flant5-xxl
      scorer_version: "1.1"
      scorer_cache_dir: /root/autodl-tmp/hf_cache/hub
      score_batch_size: 16

output:
  dir: /root/autodl-tmp/exam/results_genaibench_sd21
