model: diffusers

model_args:
  pretrained: stabilityai/stable-diffusion-xl-base-1.0
  dtype: float16
  enable_attention_slicing: true
  enable_vae_slicing: true

generation:
  steps: 50
  guidance_scale: 9.0
  seed: 42
  width: 1024
  height: 1024
  num_images_per_prompt: 1

evaluations:
  genaibench:
    eval_args:
      dataset_name: Vertsineu/geneaibench
      dataset_config_name: image_1600
      split: test_v1
      scorer_model: clip-flant5-xxl
      scorer_version: "1.1"
      scorer_cache_dir: /root/autodl-tmp/hf_cache/hub
      score_batch_size: 16

output:
  dir: /root/autodl-tmp/exam/results_genaibench_sdxl
